name: Build and Publish NuGet

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码（含子模块）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 设置 .NET 环境
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: 还原依赖
        run: dotnet restore Materal.Packable.slnx

      - name: 构建项目
        run: dotnet build Materal.Packable.slnx -c Release --no-restore

      - name: 列出生成的包（调试）
        run: |
          echo "=== Packages 目录内容 ==="
          ls -la ./Packages/
          echo ""
          echo "=== 包文件详情 ==="
          for pkg in ./Packages/*.nupkg; do
            if [ -f "$pkg" ]; then
              echo "包: $(basename $pkg)"
            fi
          done

      - name: 发布到 NuGet
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "发布功能已禁用，仅调试"
